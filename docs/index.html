<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Discover Test</title>
  <link rel="stylesheet" href="style.css?v=22" />
</head>
<body>
  <main>
    <header class="wrap hero" style="text-align: center;">
      <h1 class="light-heading">Radius Museum</h1>

      <p class="intro">
        Two artefacts, held in time.
      </p>

      <button
        type="button"
        class="quiet-button"
        onclick="playEmbeddedAudio('museumAudio')">
        Discover this guide
      </button>
    </header>
    <section class="wrap">
  <h2>Gloves</h2>

  <button
  type="button"
  class="quiet-button"
  onclick="playEmbeddedAudio('glovesAudio')"
  aria-describedby="gloves-intro">
  Discover the gloves
</button>

<p id="gloves-intro" class="sr-only">
  A pair of ladies’ leather gloves, made around eighteen thirty to eighteen fifty.
</p>
</section>
  </main>

  <audio id="museumAudio" src="audio/arrival.mp3" preload="auto"></audio>

  <script>
    let currentAudio = null;

    function stopCurrentAudio() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }
    }

    function playEmbeddedAudio(id) {
      stopCurrentAudio();
      currentAudio = document.getElementById(id);
      if (!currentAudio) return;
      currentAudio.currentTime = 0;
      currentAudio.play().catch(() => {});
    }
  </script>
</body>
</html>
