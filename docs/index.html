<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Discover Test</title>
  <link rel="stylesheet" href="style.css?v=17" />
</head>

<body>
  <main>
    <header class="wrap hero" style="text-align: center;">
      <img src="images/museum-logo.png" alt="Radius Museum logo" class="museum-logo" />
      <h1 class="light-heading">Radius Museum</h1>

      <p class="intro">
        Two artefacts, held in time.
      </p>

<img src="images/gloves.jpg" alt="Ladies’ leather gloves and sewing needle" class="object-image" />
      
      <button type="button" class="quiet-button" onclick="playEmbeddedAudio('museumAudio')">
        Discover this guide
      </button>
    </header>
  </main>

  <audio id="museumAudio" src="audio/arrival.mp3" preload="auto"></audio>

  <script>
    let currentAudio = null;

    function stopCurrentAudio() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }
    }

    function playEmbeddedAudio(id) {
      stopCurrentAudio();
      currentAudio = document.getElementById(id);
      if (!currentAudio) return;
      currentAudio.currentTime = 0;
      currentAudio.play().catch(() => {});
    }
  </script>
</body>
</html>
